{% extends 'catalog/base.html' %}

{% block title %}Удаление сыра{% endblock %}

{% block content %}
    <h1>Удаление сыра "{{ object.name }}"</h1>
    <p>Вы уверены, что хотите удалить этот сыр?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Да, удалить</button>
        <a href="{% url 'index' %}">Отмена</a>
    </form>
{% endblock %}
