{% extends 'catalog/base.html' %}

{% block title %}{% if object %}Редактирование{% else %}Добавление{% endif %} сыра{% endblock %}

{% block content %}
    <h1>{% if object %}Редактировать сыр "{{ object.name }}"{% else %}Добавить новый сыр{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить</button>
        <a href="{% url 'index' %}">Отмена</a>
    </form>
{% endblock %}
